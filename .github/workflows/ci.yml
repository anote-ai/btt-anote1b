name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  personal-backend:
    name: Personal — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Personal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          PYTHONPATH=. pytest -q standalone_tests/

  personal-frontend:
    name: Personal — Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Personal/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Personal/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  company-backend:
    name: Company — Flask pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Company
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pytest -q backend/pytest
